<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Master - Multiplayer Quiz Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            secondary: '#8b5cf6',
          }
        }
      }
    }
  </script>
  <style>
    .glassmorphism {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 to-purple-600 min-h-screen">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <div class="glass-card rounded-3xl shadow-2xl p-12 text-center max-w-2xl mx-auto mt-20">
      <h1 class="text-6xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-4">🎮 Quiz Master</h1>
      <p class="text-xl text-gray-900 mb-12 font-semibold">Real-Time Multiplayer Quiz Game</p>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
        <button onclick="goToTeacher()" class="bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-bold py-4 px-8 rounded-xl transform hover:scale-105 transition duration-300 shadow-lg hover:shadow-xl flex items-center justify-center gap-2">
          👨‍🏫 Teacher Dashboard
        </button>
        <button onclick="goToJoin()" class="bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-700 hover:to-purple-800 text-white font-bold py-4 px-8 rounded-xl transform hover:scale-105 transition duration-300 shadow-lg hover:shadow-xl flex items-center justify-center gap-2">
          🎮 Join Game
        </button>
      </div>
      
      <div class="glassmorphism rounded-2xl p-8 text-left">
        <h3 class="text-2xl font-bold text-black mb-6 text-center drop-shadow-lg">How to Play:</h3>
        <ul class="space-y-3 text-black">
          <li class="flex items-start gap-3"><span class="text-xl">👨‍🏫</span> <span><strong>Teachers:</strong> Create quizzes, manage questions, and host games</span></li>
          <li class="flex items-start gap-3"><span class="text-xl">🎮</span> <span><strong>Players:</strong> Join with a PIN and compete in real-time</span></li>
          <li class="flex items-start gap-3"><span class="text-xl">⚡</span> <span><strong>Scoring:</strong> Points based on speed and correctness - displayed in real-time!</span></li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    function goToTeacher() {
      window.location.href = '/teacher/dashboard?key=quiz123';
    }

    function goToJoin() {
      window.location.href = '/join';
    }
  </script>
</body>
</html>
