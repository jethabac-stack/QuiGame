<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Host Game - Quiz Master</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            secondary: '#8b5cf6',
          }
        }
      }
    }
  </script>
  <style>
    .glassmorphism {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .glassmorphism-dark {
      background: rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .glass-input {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3) !important;
      transition: all 0.3s ease;
    }
    
    .glass-input:focus {
      background: rgba(255, 255, 255, 0.7);
      border: 2px solid rgba(99, 102, 241, 0.5) !important;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 to-purple-600 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-8">
    <nav class="flex justify-between items-center glassmorphism rounded-2xl shadow-2xl p-6 mb-8">
      <h1 class="text-3xl font-bold text-white drop-shadow-lg">🎮 Host Game</h1>
      <a href="/" class="glassmorphism-dark text-white px-6 py-2 rounded-xl font-semibold transition duration-300">Back Home</a>
    </nav>

    <!-- Game Setup -->
    <div id="setupPhase" class="glass-card rounded-3xl shadow-2xl p-8">
      <h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-8">Select Quiz to Start</h2>
      
      <div class="mb-6">
        <label class="block text-lg font-semibold text-gray-900 mb-3">Choose Quiz *</label>
        <select id="quizSelect" class="glass-input w-full px-4 py-3 rounded-xl text-lg">
          <option value="">-- Select a quiz --</option>
        </select>
      </div>

      <div class="mb-6">
        <label class="block text-lg font-semibold text-gray-900 mb-3">Your Name (Optional)</label>
        <input type="text" id="teacherName" placeholder="Enter your name" class="glass-input w-full px-4 py-3 rounded-xl">
      </div>

      <button onclick="startGame()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-4 rounded-xl text-lg transition duration-300 shadow-lg hover:shadow-xl transform hover:scale-105">Start Game 🚀</button>
    </div>

    <!-- Game Lobby -->
    <div id="lobbyPhase" class="hidden space-y-6">
      <div class="glass-card rounded-3xl shadow-2xl p-8 text-center">
        <h2 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-4">Game PIN</h2>
        <div class="glassmorphism rounded-2xl my-6 font-mono p-6 text-8xl font-bold text-black drop-shadow-lg" id="pinDisplay"></div>
        <p class="text-xl text-gray-900 font-semibold">Share this PIN with players</p>
      </div>

      <div class="glass-card rounded-3xl shadow-2xl p-8">
        <h3 id="quizTitle" class="text-3xl font-bold text-black mb-4"></h3>
        <p id="quizTeacher" class="text-black text-lg mb-2"></p>
        <p id="questionCount" class="text-black font-semibold text-lg"></p>
      </div>

      <div class="glass-card rounded-3xl shadow-2xl p-8">
        <h3 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-6">👥 Players Joined (<span id="playerCount">0</span>)</h3>
        <div id="playersList" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4">
        <button onclick="beginQuiz()" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-4 rounded-xl text-lg transition duration-300 shadow-lg hover:shadow-xl transform hover:scale-105">Start Quiz ✅</button>
        <button onclick="endGame()" class="bg-gradient-to-r from-red-500 to-pink-600 hover:from-red-600 hover:to-pink-700 text-white font-bold py-4 rounded-xl text-lg transition duration-300 shadow-lg hover:shadow-xl transform hover:scale-105">End Game ❌</button>
      </div>
    </div>

    <!-- Game In Progress -->
    <div id="gamePhase" class="hidden space-y-6">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Question Display -->
        <div class="lg:col-span-2 glass-card rounded-3xl shadow-2xl p-8">
          <div class="flex justify-between items-center mb-6">
            <h2 id="questionNumber" class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600"></h2>
            <div class="text-4xl font-bold text-red-600 glassmorphism px-6 py-3 rounded-xl animate-pulse" id="questionTimer"></div>
          </div>
          
          <div class="glassmorphism rounded-2xl p-6 mb-6">
            <h3 id="questionText" class="text-2xl font-semibold text-black drop-shadow-lg"></h3>
          </div>
          
          <div id="optionsDisplay" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6"></div>
        </div>

        <!-- Live Leaderboard Sidebar -->
        <div class="glassmorphism rounded-3xl shadow-2xl p-6">
          <h3 class="text-2xl font-bold text-black mb-6 flex items-center gap-2 drop-shadow-lg">
            <span class="text-3xl">🏆</span> Live Scores
          </h3>
          <div id="leaderboard" class="space-y-2 max-h-96 overflow-y-auto"></div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4">
        <button onclick="nextQuestion()" class="bg-gradient-to-r from-blue-500 to-cyan-600 hover:from-blue-600 hover:to-cyan-700 text-white font-bold py-4 rounded-xl text-lg transition duration-300 shadow-lg hover:shadow-xl transform hover:scale-105">Next Question ⏭️</button>
        <button onclick="endGame()" class="bg-gradient-to-r from-red-500 to-pink-600 hover:from-red-600 hover:to-pink-700 text-white font-bold py-4 rounded-xl text-lg transition duration-300 shadow-lg hover:shadow-xl transform hover:scale-105">End Game ❌</button>
      </div>
    </div>

    <!-- Game Results -->
    <div id="resultsPhase" class="hidden space-y-6">
      <div class="glass-card rounded-3xl shadow-2xl p-8 text-center">
        <h2 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-8">Quiz Ended! 🎉</h2>
        
        <div class="glassmorphism rounded-2xl p-8 mb-8">
          <p class="text-2xl font-semibold text-black mb-2 drop-shadow-lg">🏆 Winner</p>
          <p id="winnerName" class="text-4xl font-bold text-black drop-shadow-lg mb-2"></p>
          <p id="winnerScore" class="text-2xl text-black drop-shadow-lg"></p>
        </div>
      </div>

      <div class="glass-card rounded-3xl shadow-2xl p-8">
        <h3 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-6">Final Leaderboard</h3>
        <div id="finalLeaderboard" class="space-y-3"></div>
      </div>

      <button onclick="goHome()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-4 rounded-xl text-lg transition duration-300 shadow-lg hover:shadow-xl transform hover:scale-105">Back to Dashboard 📊</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/host.js"></script>
</body>
</html>
