<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="/image/logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/image/logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/image/logo.png">
    <link rel="manifest" href="/site.webmanifest">
    <title>Storyboarding Portal - Host Authentication</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
            overflow: auto;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 100%;
            padding: 25px;
            animation: slideIn 0.5s ease-out;
            position: relative;
            z-index: 10;
            margin: auto;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .auth-header h1 {
            color: #333;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .auth-header p {
            color: #666;
            font-size: 12px;
        }
        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            position: relative;
            bottom: -2px;
        }

        .auth-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .auth-tab:hover {
            color: #667eea;
        }

        .form-group {
            margin-bottom: 15px;
            display: none;
        }

        .form-group.active {
            display: block;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            margin-bottom: 6px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 13px;
        }

        .password-field {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-field input {
            flex: 1;
            margin-bottom: 0;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            color: #667eea;
            font-size: 16px;
        }

        .error-message {
            display: none;
            background-color: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 12px;
            border-left: 4px solid #c33;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            display: none;
            background-color: #efe;
            color: #3c3;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 12px;
            border-left: 4px solid #3c3;
        }

        .success-message.show {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .btn.loading::after {
            content: '';
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            text-align: center;
            margin: 15px 0;
            color: #999;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            display: inline-block;
            width: 40%;
            height: 1px;
            background: #ddd;
            vertical-align: middle;
        }

        .divider::before {
            margin-right: 8px;
        }

        .divider::after {
            margin-left: 8px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .checkbox-group input[type="checkbox"] {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .checkbox-group label {
            flex: 1;
            margin: 0;
            font-weight: 400;
            color: #666;
            cursor: pointer;
            font-size: 13px;
        }

        .helper-text {
            font-size: 11px;
            color: #999;
            margin-top: 6px;
        }

        .landing-link {
            text-align: center;
            margin-top: 15px;
        }

        .landing-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
            transition: color 0.3s ease;
        }

        .landing-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 15px;
        }

        .loading-spinner.show {
            display: block;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 18px;
                border-radius: 12px;
            }

            .auth-header h1 {
                font-size: 18px;
            }

            .auth-header p {
                font-size: 11px;
            }

            .auth-tab {
                font-size: 13px;
                padding: 10px;
            }

            .form-group label {
                font-size: 12px;
            }

            .form-group input {
                font-size: 12px;
                padding: 8px;
            }

            .helper-text {
                font-size: 11px;
            }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            .auth-container {
                padding: 30px;
            }

            .auth-header h1 {
                font-size: 24px;
            }
        }

        @media (min-width: 769px) {
            .auth-container {
                padding: 40px;
            }

            .auth-header h1 {
                font-size: 28px;
            }

            .form-group label {
                font-size: 14px;
            }

            .form-group input {
                font-size: 14px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Math Symbols Rain Canvas -->
    <canvas id="mathRain" class="fixed inset-0 pointer-events-none" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></canvas>
    
    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <img src="/image/logo.png" alt="Storyboarding Portal Logo" style="width: 60px; height: auto; margin: 0 auto 8px; display: block;">
            <h2 style="color: #667eea; font-size: 18px; margin-bottom: 5px; font-weight: bold;">Storyboarding Portal</h2>
            <p>Host Dashboard Authentication</p>
        </div>

        <!-- Tab Selection -->
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Login</button>
            <button class="auth-tab" data-tab="register">Register</button>
        </div>

        <!-- Messages -->
        <div class="error-message" id="errorMsg"></div>
        <div class="success-message" id="successMsg"></div>

        <!-- Login Form -->
        <form id="loginForm" class="form-group active">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" placeholder="your@email.com" required>

            <label for="loginPassword">Password</label>
            <div class="password-field">
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
                <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
                    👁️
                </button>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="btn">Sign In</button>

            <p class="helper-text">
                🔐 Your credentials are securely encrypted and stored in Firebase.
            </p>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="form-group">
            <label for="registerName">Display Name</label>
            <input type="text" id="registerName" placeholder="John Doe" required>

            <label for="registerEmail">Email Address</label>
            <input type="email" id="registerEmail" placeholder="your@email.com" required>

            <label for="registerPassword">Password</label>
            <div class="password-field">
                <input type="password" id="registerPassword" placeholder="Minimum 6 characters" required>
                <button type="button" class="toggle-password" onclick="togglePassword('registerPassword')">
                    👁️
                </button>
            </div>

            <label for="confirmPassword">Confirm Password</label>
            <div class="password-field">
                <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                    👁️
                </button>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="agreeTerms" required>
                <label for="agreeTerms">I agree to the terms and conditions</label>
            </div>

            <button type="submit" class="btn">Create Account</button>

            <p class="helper-text">
                ✓ Passwords must be at least 6 characters long.
            </p>
        </form>

        <!-- Loading Spinner -->
        <div class="loading-spinner" id="loadingSpinner">
            <div style="font-size: 24px; animation: spin 1s linear infinite;">⏳</div>
            <p style="margin-top: 10px; color: #999;">Processing...</p>
        </div>

        <!-- Footer Links -->
        <div class="landing-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Helper function - must be in global scope for onclick handlers
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            field.type = field.type === 'password' ? 'text' : 'password';
        }
    </script>
    <script type="module">
        import { registerHost, loginHost, getCurrentUser, onAuthChange } from './js/firebase-config.js';

        // Check if user is already logged in
        onAuthChange((user) => {
            if (user) {
                // Redirect to dashboard
                redirectToDashboard();
            }
        });

        // Tab switching
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                const tabName = e.target.dataset.tab;
                
                // Update active tab
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                
                // Update active form
                document.querySelectorAll('.form-group').forEach(form => form.classList.remove('active'));
                if (tabName === 'login') {
                    document.getElementById('loginForm').classList.add('active');
                } else {
                    document.getElementById('registerForm').classList.add('active');
                }
                
                // Clear messages
                clearMessages();
            });
        });

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }
            
            try {
                showLoading();
                const user = await loginHost(email, password);
                
                if (user.token) {
                    // Save token to localStorage
                    localStorage.setItem('firebaseToken', user.token);
                    localStorage.setItem('hostId', user.uid);
                    localStorage.setItem('hostName', user.email);
                    
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        redirectToDashboard();
                    }, 1000);
                }
            } catch (error) {
                showError(error.message || 'Login failed. Please try again.');
            } finally {
                hideLoading();
            }
        });

        // Register form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validation
            if (!name || !email || !password || !confirmPassword) {
                showError('Please fill in all fields');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters long');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            if (!document.getElementById('agreeTerms').checked) {
                showError('You must agree to the terms and conditions');
                return;
            }
            
            try {
                showLoading();
                const user = await registerHost(email, password, name);
                
                // Get token
                const token = await user.getIdToken();
                
                // Save to localStorage
                localStorage.setItem('firebaseToken', token);
                localStorage.setItem('hostId', user.uid);
                localStorage.setItem('hostName', name);
                
                showSuccess('Account created successfully! Redirecting...');
                setTimeout(() => {
                    redirectToDashboard();
                }, 1000);
            } catch (error) {
                if (error.message.includes('email-already-in-use')) {
                    showError('This email is already registered. Please login instead.');
                } else if (error.message.includes('weak-password')) {
                    showError('Password is too weak. Use at least 6 characters.');
                } else {
                    showError(error.message || 'Registration failed. Please try again.');
                }
            } finally {
                hideLoading();
            }
        });

        // Helper functions
        function showError(message) {
            clearMessages();
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function showSuccess(message) {
            clearMessages();
            const successDiv = document.getElementById('successMsg');
            successDiv.textContent = message;
            successDiv.classList.add('show');
        }

        function clearMessages() {
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('successMsg').classList.remove('show');
        }

        function showLoading() {
            document.getElementById('loadingSpinner').classList.add('show');
            document.querySelectorAll('.form-group.active input').forEach(input => {
                input.disabled = true;
            });
            document.querySelectorAll('.form-group.active button[type="submit"]').forEach(btn => {
                btn.disabled = true;
                btn.classList.add('loading');
            });
        }

        function hideLoading() {
            document.getElementById('loadingSpinner').classList.remove('show');
            document.querySelectorAll('.form-group.active input').forEach(input => {
                input.disabled = false;
            });
            document.querySelectorAll('.form-group.active button[type="submit"]').forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('loading');
            });
        }

        function getRedirectPath() {
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect');
            return redirect ? redirect : '/dashboard';
        }

        function redirectToDashboard() {
            window.location.href = getRedirectPath();
        }
    </script>
    <script src="/js/math-rain.js"></script>
</body>
</html>
